services:
  marquinhosbot:
    build: .
    image: marquinhosbot:latest
    container_name: marquinhosbot
    env_file:
      - /etc/marquinhos/marquinhos.conf
    environment:
      - NODE_ENV=production
    restart: on-failure:5
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'bun']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - marquinhos-net
    logging:
      driver: json-file
      options:
        max-size: '100m'
        max-file: '10'

networks:
  marquinhos-net:
    external: true
