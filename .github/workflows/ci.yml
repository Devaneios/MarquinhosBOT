name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, marquinhos-runner]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint check
        run: bun run lint:check

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build

  deploy:
    needs: build
    runs-on: [self-hosted, Linux, X64, marquinhos-runner]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (with layer cache)
        run: |
          docker compose build \
            --build-arg BUILDKIT_INLINE_CACHE=1

      - name: Tag image with commit SHA
        run: |
          docker tag marquinhosbot:latest marquinhosbot:${{ github.sha }}

      - name: Scan image for CVEs
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            marquinhosbot:${{ github.sha }}

      - name: Swap container
        run: |
          docker compose down || true
          docker compose up -d --no-build

      - name: Wait for healthy status
        run: |
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' marquinhosbot 2>/dev/null || echo "missing")
            echo "Attempt $i/12: $STATUS"
            [ "$STATUS" = "healthy" ] && { echo "Marquinhos is healthy"; exit 0; }
            sleep 5
          done
          echo "Health check timed out — rolling back"
          echo "--- Container logs ---"
          docker logs marquinhosbot --tail 100 2>&1 || true
          echo "--- Container inspect ---"
          docker inspect marquinhosbot --format='ExitCode={{.State.ExitCode}} Status={{.State.Status}} Error={{.State.Error}}' 2>&1 || true
          docker compose down || true
          if docker image inspect marquinhosbot:previous &>/dev/null; then
            docker tag marquinhosbot:previous marquinhosbot:latest
            docker compose up -d --no-build || true
          fi
          exit 1

      - name: Tag successful image as previous (for rollback)
        if: success()
        run: docker tag marquinhosbot:${{ github.sha }} marquinhosbot:previous
